<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détection d'âge - IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .logo { font-size: 80px; margin-bottom: 20px; }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #a0aec0;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .upload-box {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(0,210,255,0.4);
            border-radius: 20px;
            padding: 50px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }
        .upload-box:hover {
            border-color: #00d2ff;
            background: rgba(0,210,255,0.05);
            transform: translateY(-3px);
        }
        .upload-icon { font-size: 50px; margin-bottom: 15px; }
        .upload-text { color: #a0aec0; font-size: 1rem; }
        .upload-text span { color: #00d2ff; font-weight: 600; }
        input[type="file"] { display: none; }
        .preview-name {
            color: #00d2ff;
            margin-top: 10px;
            font-size: 0.9rem;
            min-height: 20px;
        }
        .btn {
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,210,255,0.3);
        }
        .error {
            background: rgba(255,80,80,0.15);
            border: 1px solid rgba(255,80,80,0.4);
            color: #ff8080;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(255,255,255,0.07);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">🧠</div>
    <h1>Détection d'Âge</h1>
    <p class="subtitle">Intelligence Artificielle · Modèle Caffe · OpenCV DNN</p>

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'detect' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="imageInput">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📸</div>
                <p class="upload-text">Glissez une image ou <span>cliquez pour choisir</span></p>
                <p class="upload-text" style="font-size:0.85rem; margin-top:8px;">JPG, PNG supportés</p>
                <p class="preview-name" id="previewName"></p>
            </div>
        </label>
        <input type="file" id="imageInput" name="image" accept="image/*" onchange="showName(this)">
        <button type="submit" class="btn">🔍 Analyser l'image</button>
    </form>

    <div class="badges">
        <span class="badge">🧒 Enfant</span>
        <span class="badge">🧑 Adolescent</span>
        <span class="badge">👨 Adulte</span>
        <span class="badge">👴 Senior</span>
    </div>
</div>

<script>
function showName(input) {
    const name = input.files[0] ? input.files[0].name : '';
    document.getElementById('previewName').textContent = name ? '✅ ' + name : '';
}
</script>
</body>
</html>
